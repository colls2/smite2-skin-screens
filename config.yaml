# Scroll wheel clicks to advance the grid by one row.
# One row is between 7 and 8 clicks on this setup, so 14 (= ~2 rows) is used
# to let drift average out. Increase if the grid undershoots, decrease if it overshoots.
scroll_clicks_per_row: 14

delays:
  after_click: 0.5
  after_god_select: 1.5
  after_skin_select: 1.0
grid:
  columns: 3
  gap_x: 13
  gap_y: 13
output_dir: output
regions:
  btn_next_god:
  - 166
  - 70
  - 27
  - 28
  btn_prev_god:
  - 129
  - 72
  - 20
  - 22
  first_card:
  - 208
  - 382
  - 201
  - 296
  god_name:
  - 208
  - 139
  - 756
  - 73
  grid_area:
  - 200
  - 372
  - 659
  - 755
  scrollbar_track: [0, 0, 0, 0]   # thin vertical strip on the right edge of the grid
  model_view:
  - 862
  - 224
  - 747
  - 1115
  skin_name:
  - 1910
  - 216
  - 532
  - 116
tesseract_path: C:\Program Files\Tesseract-OCR\tesseract.exe
